<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratório de BMs — Login</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="src/styles/theme.css">
  <link rel="stylesheet" href="src/styles/components.css">
  <link rel="stylesheet" href="src/styles/buttons.css">
  <link rel="stylesheet" href="src/styles/icon-cube.css">
  <link rel="stylesheet" href="src/styles/inputs.css">
  <link rel="stylesheet" href="src/styles/misc.css">
  <link rel="stylesheet" href="src/styles/animations.css">

  <!-- Tailwind CDN -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Sora', 'sans-serif'],
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com/3.4.0"></script>

  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 1rem; }
    .card { width: 100%; max-width: 28rem; }
    .page { display: none; }
    .page.active { display: block; }
    .input-field {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      color: white;
      font-size: 0.95rem;
      transition: border-color 0.15s;
      outline: none;
    }
    .input-field:focus { border-color: rgba(168,85,247,0.6); }
    .input-field::placeholder { color: #64748b; }
  </style>
</head>
<body>

<div id="page-login" class="page active">
  <div class="card">
    <div class="glass rounded-3xl p-8" style="background:rgba(15,23,55,.95);">
      <div class="flex justify-center mb-6">
        <div class="icon-cube purple" style="width:72px;height:72px;font-size:36px;border-radius:20px;">🧪</div>
      </div>

      <h1 class="font-display text-2xl sm:text-3xl text-center grad-text mb-1">Laboratório de BMs</h1>
      <p class="text-slate-400 text-center text-sm mb-8">Entre com suas credenciais</p>

      <div id="error" class="hidden mb-4 p-3 rounded-xl text-sm text-center" style="background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25);"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs text-slate-400 mb-1.5 ml-1">Usuário</label>
          <input id="login-user" type="text" placeholder="Usuário" autocomplete="username" class="input-field">
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1.5 ml-1">Senha</label>
          <input id="login-pass" type="password" placeholder="Senha" autocomplete="current-password" class="input-field">
        </div>
        <button id="login-btn" class="btn-3d purple w-full mt-2">Entrar</button>
      </div>

      <p class="text-center mt-6 text-sm text-slate-400">
        Não tem conta?
        <span class="text-purple-400 cursor-pointer hover:underline" onclick="showPage('register')">Criar conta</span>
      </p>
    </div>
  </div>
</div>

<!-- Register Page -->
<div id="page-register" class="page">
  <div class="card">
    <div class="glass rounded-3xl p-8" style="background:rgba(15,23,55,.95);">
      <div class="flex justify-center mb-6">
        <div class="icon-cube purple" style="width:72px;height:72px;font-size:36px;border-radius:20px;">🧪</div>
      </div>

      <h1 class="font-display text-2xl sm:text-3xl text-center grad-text mb-1">Criar Conta</h1>
      <p class="text-slate-400 text-center text-sm mb-8">Beta — máximo 2 contas</p>

      <div id="reg-error" class="hidden mb-4 p-3 rounded-xl text-sm text-center" style="background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25);"></div>
      <div id="reg-success" class="hidden mb-4 p-3 rounded-xl text-sm text-center" style="background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.25);"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs text-slate-400 mb-1.5 ml-1">Usuário</label>
          <input id="reg-user" type="text" placeholder="Usuário" autocomplete="username" class="input-field">
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1.5 ml-1">Senha</label>
          <input id="reg-pass" type="password" placeholder="Senha" autocomplete="new-password" class="input-field">
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1.5 ml-1">Confirmar Senha</label>
          <input id="reg-pass2" type="password" placeholder="Repita a senha" autocomplete="new-password" class="input-field">
        </div>
        <button id="reg-btn" class="btn-3d purple w-full mt-2">Criar Conta</button>
      </div>

      <p class="text-center mt-6 text-sm text-slate-400">
        Já tem conta?
        <span class="text-purple-400 cursor-pointer hover:underline" onclick="showPage('login')">Fazer login</span>
      </p>
    </div>
  </div>
</div>

<!-- Waitlist Page (beta full) -->
<div id="page-waitlist" class="page">
  <div class="card">
    <div class="glass rounded-3xl p-8 text-center" style="background:rgba(15,23,55,.95);">
      <div class="flex justify-center mb-6">
        <div class="icon-cube amber" style="width:72px;height:72px;font-size:36px;border-radius:20px;">🚧</div>
      </div>

      <h1 class="font-display text-2xl grad-text mb-3">Beta Lotado</h1>
      <p class="text-slate-400 mb-6">O beta está limitado a 2 contas. Deixe seu email para ser avisado quando abrirmos mais vagas.</p>

      <div id="wl-error" class="hidden mb-4 p-3 rounded-xl text-sm" style="background:rgba(239,68,68,.12);color:#fca5a5;"></div>
      <div id="wl-success" class="hidden mb-4 p-3 rounded-xl text-sm" style="background:rgba(34,197,94,.12);color:#86efac;"></div>

      <div class="space-y-3">
        <input id="wl-email" type="email" placeholder="seu@email.com" class="input-field">
        <button id="wl-btn" class="btn-3d amber w-full">Entrar na Lista de Espera</button>
      </div>

      <p class="text-center mt-6 text-sm text-slate-400">
        <span class="text-purple-400 cursor-pointer hover:underline" onclick="showPage('login')">← Voltar ao login</span>
      </p>
    </div>
  </div>
</div>

<script type="module">
// =============================================================================
// STANDALONE LOGIN PAGE — No sidebar, no header, no app shell.
// On successful login, redirects to index.html.
// =============================================================================

import { login } from './src/auth/session.js';
import { checkAuth } from './src/auth/session.js';

// If already logged in, redirect immediately to main app
const auth = checkAuth();
if (auth.authenticated) {
  window.location.href = 'index.html';
}

// Make showPage globally accessible
window.showPage = function(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-' + name);
  if (page) page.classList.add('active');
};

// ----- LOGIN -----
const loginUser = document.getElementById('login-user');
const loginPass = document.getElementById('login-pass');
const loginBtn = document.getElementById('login-btn');
const loginError = document.getElementById('error');

function showLoginError(msg) {
  loginError.textContent = msg;
  loginError.classList.remove('hidden');
}
function hideLoginError() { loginError.classList.add('hidden'); }

loginBtn.addEventListener('click', async () => {
  hideLoginError();
  const username = loginUser.value.trim();
  const password = loginPass.value;

  if (!username || !password) {
    showLoginError('Preencha usuário e senha.');
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = 'Entrando...';

  const result = await login(username, password);

  if (result.success) {
    window.location.href = 'index.html';
  } else {
    const msgs = {
      invalid_credentials: 'Usuário ou senha incorretos.',
      account_not_found: 'Conta não encontrada.',
      network_error: 'Erro de conexão.'
    };
    showLoginError(msgs[result.error] || 'Erro ao fazer login.');
    loginBtn.disabled = false;
    loginBtn.textContent = 'Entrar';
  }
});

loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });
loginUser.addEventListener('keydown', e => { if (e.key === 'Enter') loginPass.focus(); });

// ----- REGISTER -----
const regUser = document.getElementById('reg-user');
const regPass = document.getElementById('reg-pass');
const regPass2 = document.getElementById('reg-pass2');
const regBtn = document.getElementById('reg-btn');
const regError = document.getElementById('reg-error');
const regSuccess = document.getElementById('reg-success');

regBtn.addEventListener('click', async () => {
  regError.classList.add('hidden');
  regSuccess.classList.add('hidden');

  const username = regUser.value.trim();
  const password = regPass.value;
  const password2 = regPass2.value;

  if (!username || !password) {
    regError.textContent = 'Preencha usuário e senha.';
    regError.classList.remove('hidden');
    return;
  }
  if (password !== password2) {
    regError.textContent = 'As senhas não conferem.';
    regError.classList.remove('hidden');
    return;
  }
  if (password.length < 3) {
    regError.textContent = 'A senha deve ter pelo menos 3 caracteres.';
    regError.classList.remove('hidden');
    return;
  }

  regBtn.disabled = true;
  regBtn.textContent = 'Criando...';

  try {
    // Check account count first
    const countRes = await fetch('/.netlify/functions/auth-count');
    const countData = await countRes.json();

    if (countData.count >= 2) {
      showPage('waitlist');
      return;
    }

    const res = await fetch('/.netlify/functions/auth-register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.success) {
      regSuccess.textContent = 'Conta criada! Redirecionando...';
      regSuccess.classList.remove('hidden');
      setTimeout(() => showPage('login'), 1500);
    } else {
      regError.textContent = data.error || 'Erro ao criar conta.';
      regError.classList.remove('hidden');
      regBtn.disabled = false;
      regBtn.textContent = 'Criar Conta';
    }
  } catch (e) {
    regError.textContent = 'Erro de conexão.';
    regError.classList.remove('hidden');
    regBtn.disabled = false;
    regBtn.textContent = 'Criar Conta';
  }
});

// ----- WAITLIST -----
const wlEmail = document.getElementById('wl-email');
const wlBtn = document.getElementById('wl-btn');
const wlError = document.getElementById('wl-error');
const wlSuccess = document.getElementById('wl-success');

wlBtn.addEventListener('click', async () => {
  wlError.classList.add('hidden');
  wlSuccess.classList.add('hidden');

  const email = wlEmail.value.trim();
  if (!email || !email.includes('@')) {
    wlError.textContent = 'Digite um email válido.';
    wlError.classList.remove('hidden');
    return;
  }

  wlBtn.disabled = true;
  wlBtn.textContent = 'Enviando...';

  try {
    const res = await fetch('/.netlify/functions/waitlist-join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    if (data.success) {
      wlSuccess.textContent = 'Email cadastrado! Entraremos em contato.';
      wlSuccess.classList.remove('hidden');
    } else {
      wlError.textContent = data.error || 'Erro ao cadastrar.';
      wlError.classList.remove('hidden');
    }
  } catch (e) {
    wlError.textContent = 'Erro de conexão.';
    wlError.classList.remove('hidden');
  }

  wlBtn.disabled = false;
  wlBtn.textContent = 'Entrar na Lista de Espera';
});
</script>

</body>
</html>
